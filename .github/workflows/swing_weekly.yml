name: Swing Weekly Scanner

on:
  schedule:
    - cron: '30 4 * * 6'  # Every Saturday 10:00 AM IST
  workflow_dispatch:
jobs:
  run-swing-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy yfinance supabase streamlit python-dotenv fpdf2

      - name: Create reports directory
        run: mkdir -p reports

